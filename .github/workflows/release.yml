name: Release

# Triggers on a `vX.Y.Z` tag push or manual dispatch from the Actions tab.
# The tag value is what electron-updater compares against to ship updates,
# so it must match the `version` field in package.json (electron-builder
# checks this and refuses if they disagree).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write # required so electron-builder can create the GitHub Release

# Avoid two simultaneous releases racing on the same draft. The macOS,
# Windows, and Linux jobs in this workflow ARE allowed to run in
# parallel — electron-builder's `--publish always` is designed to
# append artifacts to an existing draft release. But two `release.yml`
# runs (e.g. retag of the same version) racing each other can create
# duplicate release drafts; this group prevents that.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    # macos-14 runs on Apple Silicon, which lets us produce both arm64 and
    # x64 binaries from the same job (electron-builder cross-builds the
    # Intel slice via Rosetta-based Node tooling).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main bundles
        run: npm run build

      # Materialise the .p12 cert and the App Store Connect API key on disk —
      # electron-builder needs file paths, not the inline base64. Both files
      # land in $RUNNER_TEMP which the runner wipes after the job; the
      # explicit cleanup step at the end is belt-and-braces.
      - name: Decode signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
        run: echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

      - name: Decode App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: echo "$API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, sign, notarize, publish
        env:
          # Code signing — electron-builder imports the .p12 into a
          # temporary keychain and uses it for the .app + dmg signatures.
          CSC_LINK: ${{ runner.temp }}/cert.p12
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          # Notarization via App Store Connect API key (preferred over an
          # app-specific password: no rotation, no team-membership edge cases).
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # GitHub token for the publish step. The default GITHUB_TOKEN has
          # `contents: write` thanks to the permissions block above, which
          # is enough to create a release in this repo.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac -- --publish always

      - name: Clean up secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/AuthKey.p8"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main bundles
        run: npm run build

      # Code signing for Windows is optional — users will see a
      # SmartScreen warning on first launch of unsigned installers but
      # the app still installs and runs. To enable signing later, set
      # WINDOWS_CERT_PFX_BASE64 + WINDOWS_CERT_PASSWORD secrets and
      # uncomment the CSC_* env vars below; electron-builder picks them
      # up automatically.
      - name: Build + publish
        env:
          # CSC_LINK: ${{ runner.temp }}/cert.pfx
          # CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      # electron-builder's AppImage step needs a couple of system tools
      # that aren't preinstalled on `ubuntu-latest` minimal images. The
      # standard runner usually has them, but pin them explicitly so a
      # future image strip doesn't silently break the build.
      - name: Install AppImage prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main bundles
        run: npm run build

      - name: Build + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux -- --publish always
